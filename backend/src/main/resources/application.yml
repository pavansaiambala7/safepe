# ============================================================================
# SafePe Backend — Application Configuration
# ============================================================================
# All secrets are injected via environment variables. Never commit real values.
# ============================================================================

server:
  port: 8080

# ── PostgreSQL ───────────────────────────────────────────────────────────────
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/safepe
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # ── JPA / Hibernate ──────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Redis ────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# ── SafePe Custom Configuration ─────────────────────────────────────────────
safepe:

  # Gemini AI — fraud-risk scoring
  gemini:
    api-key: ${GEMINI_API_KEY}
    model: gemini-2.0-flash
    base-url: https://generativelanguage.googleapis.com/v1beta

  # Razorpay — payment gateway
  razorpay:
    key-id: ${RAZORPAY_KEY_ID}
    key-secret: ${RAZORPAY_KEY_SECRET}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET}

  # Clerk — authentication provider
  clerk:
    issuer: https://${CLERK_DOMAIN}
    jwks-url: https://${CLERK_DOMAIN}/.well-known/jwks.json

  # Vault — field-level encryption
  encryption:
    master-key: ${VAULT_MASTER_KEY}
