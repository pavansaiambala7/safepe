# ============================================================================
# SafePe Backend — Application Configuration
# ============================================================================
# All secrets are injected via environment variables. Never commit real values.
# ============================================================================

server:
  port: 8080

# ── PostgreSQL ───────────────────────────────────────────────────────────────
spring:
  config:
    import: optional:file:../.env[.properties]
  datasource:
    url: jdbc:h2:mem:safepe;DB_CLOSE_DELAY=-1
    username: sa
    password: password
    driver-class-name: org.h2.Driver

  # ── JPA / Hibernate ──────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  # ── Redis ────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# ── SafePe Custom Configuration ─────────────────────────────────────────────
safepe:

  # Gemini AI — fraud-risk scoring
  gemini:
    api-key: ${GEMINI_API_KEY}
    model: gemini-2.5-flash
    base-url: https://generativelanguage.googleapis.com/v1beta

  # Razorpay — payment gateway
  razorpay:
    key-id: ${RAZORPAY_KEY_ID}
    key-secret: ${RAZORPAY_KEY_SECRET}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET}

  # Clerk — authentication provider
  clerk:
    issuer: https://creative-muskox-36.clerk.accounts.dev
    jwks-url: https://creative-muskox-36.clerk.accounts.dev/.well-known/jwks.json

  # Vault — field-level encryption
  encryption:
    master-key: ${VAULT_MASTER_KEY}
