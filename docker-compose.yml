version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: safepe-postgres
    environment:
      POSTGRES_USER: safepe_user
      POSTGRES_PASSWORD: safepe_password
      POSTGRES_DB: safepe_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safepe_user -d safepe_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safepe-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/safepe_db
      - SPRING_DATASOURCE_USERNAME=safepe_user
      - SPRING_DATASOURCE_PASSWORD=safepe_password
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-rzp_test_T5AtiMDfqh5J2N}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-rzp_test_secret_here}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-gemini_key_here}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:-clerk_secret_here}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: safepe-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_VITE_API_URL=http://localhost:8080/api
      - VITE_VITE_CLERK_PUBLISHABLE_KEY=${VITE_VITE_CLERK_PUBLISHABLE_KEY:-pk_test_Y2xlcmsubG9jYWw}
    depends_on:
      - backend

volumes:
  postgres_data:
